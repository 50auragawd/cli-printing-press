openapi: "3.0.3"
info:
  title: Café Bistro API
  version: "1.0.0"
  description: Purpose-built fixture for the Unicode-to-ASCII slug contract.
servers:
  - url: https://api.cafe-bistro.example/v1
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Menu:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
paths:
  /menus:
    get:
      tags: [menus]
      operationId: listMenus
      summary: List menus
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Menu"
